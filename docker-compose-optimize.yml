# ==========================================
# CẤU HÌNH GỐC CHO KESTRA (YAML Anchor)
# ==========================================
x-kestra-base: &kestra-base
  image: kestra/kestra:v0.19.8
  restart: unless-stopped
  environment:
    KESTRA_PLUGINS: "io.kestra.plugin:plugin-aws:LATEST,io.kestra.plugin:plugin-script-python:LATEST"
    KESTRA_CONFIGURATION: |
      kestra:
        repository:
          type: postgres
        queue:
          type: postgres
        storage:
          type: local
          local:
            base-path: /app/storage
      datasources:
        postgres:
          url: jdbc:postgresql://postgres:5432/kestra
          driverClassName: org.postgresql.Driver
          username: kestra
          password: kestra_password_123
  volumes:
    - kestra_storage_data:/app/storage
    - kestra_plugins_data:/app/plugins
    - /var/run/docker.sock:/var/run/docker.sock 
  depends_on:
    postgres:
      condition: service_started
    kestra-init-volume:
      condition: service_completed_successfully
  networks:
    - rag_net
  extra_hosts:
    - "host.docker.internal:host-gateway"

services:
  # 1. Qwen 2.5 3B Instruct Service
  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: llama-qwen3-5-2b-service
    ports:
      - "8000:8080"
    volumes:
      - ./llama-services/qwen3.5-2B-q4_0.gguf/models:/models
    command: >
      -m /models/Qwen3.5-2B-Q4_K_S.gguf
      --mmproj /models/qwen3.5-2b-mmproj-f16.gguf
      --host 0.0.0.0
      --port 8080
      -ngl 99
      --chat-template-kwargs "{\"enable_thinking\": false}"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - rag_net

  # 2. Paddle OCR VL Service
  paddleocr-llama:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: paddleocr-llama-service
    restart: unless-stopped
    ports:
      - "8300:8080"
    volumes:
      - ./llama-services/paddle-ocr-vl/models:/models
    command: >
      -m /models/PaddleOCR-VL-1.6.Q4_K_M.gguf --mmproj /models/PaddleOCR-VL-1.6-GGUF-mmproj.gguf --host 0.0.0.0 --port 8080 -c 6144 -ngl 99 -fa on -np 2
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    networks:
      - rag_net

  # 3. Layout Detector Service
  document-analyzer:
    build: ./services/document-analyzer
    container_name: document-analyzer-service
    restart: unless-stopped
    ports:
      - "8500:8500"
    environment:
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=document_storage
      - MINIO_SECRET_KEY=document_storage_password_123
      - MINIO_SECURE=False
      - LLM_OCR_ENDPOINT=http://host.docker.internal:8300/v1/chat/completions
      - LLM_OCR_MODEL=paddleocr
      - LLM_OCR_TEMPERATURE=0.1
      - LLM_OCR_MAX_TOKENS=4096
      - OCR_MAX_THREADS=2
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./services/document-analyzer/input:/app/input
      - ./services/document-analyzer/output:/app/output
    shm_size: '8gb'
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    depends_on:
      - minio
    networks:
      - rag_net

  # 4. MinIO S3 Storage Service
  minio:
    image: quay.io/minio/minio:latest
    container_name: minio-storage-service
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: document_storage
      MINIO_ROOT_PASSWORD: document_storage_password_123
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - rag_net

  # 5. Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant-vector-db
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - rag_net

  # 6. Shared PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: postgres-storage-service
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: kestra
      POSTGRES_USER: kestra
      POSTGRES_PASSWORD: kestra_password_123
    volumes:
      - postgres_db_data:/var/lib/postgresql/data
    networks:
      - rag_net

  # 6.5. Kestra Volume Permission Init (Chạy 1 lần trước khi khởi động Kestra)
  kestra-init-volume:
    image: alpine
    container_name: kestra-init-volume
    user: "0:0"
    volumes:
      - kestra_storage_data:/app/storage
      - kestra_plugins_data:/app/plugins
    command: chown -R 1000:1000 /app/storage /app/plugins
    networks:
      - rag_net

  # ---------------------------------------------------------
  # 7. Kestra Webserver (Giao diện UI & API)
  # ---------------------------------------------------------
  kestra-webserver:
    <<: *kestra-base
    container_name: kestra-webserver
    command: server webserver
    ports:
      - "8600:8080"

  # ---------------------------------------------------------
  # 8. Kestra Executor (Nhạc trưởng điều phối luồng logic)
  # ---------------------------------------------------------
  kestra-executor:
    <<: *kestra-base
    container_name: kestra-executor
    command: server executor

  # ---------------------------------------------------------
  # 9. Kestra Scheduler (Quét và kích hoạt trigger/cronjob)
  # ---------------------------------------------------------
  kestra-scheduler:
    <<: *kestra-base
    container_name: kestra-scheduler
    command: server scheduler

  # ---------------------------------------------------------
  # 10. Kestra Worker (Công nhân trực tiếp chạy task)
  # ---------------------------------------------------------
  kestra-worker:
    <<: *kestra-base
    container_name: kestra-worker
    command: server worker

networks:
  rag_net:
    driver: bridge

volumes:
  minio_data:
  qdrant_data:
  postgres_db_data:
  kestra_storage_data:
  kestra_plugins_data: