version: '3.8'

networks:
  peerdb-lab:
    driver: bridge

services:
  # 1. SOURCE: MongoDB (Có cấu hình tự động bật Replica Set để làm CDC)
  mongodb:
    image: mongo:6.0
    container_name: mongodb
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    networks:
      - peerdb-lab
    healthcheck:
      test: mongosh --eval "try { rs.status().ok } catch (e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongodb:27017'}]}); }"
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. TARGET: ClickHouse
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    networks:
      - peerdb-lab

  # 3. TRUNG CHUYỂN: MinIO (S3 mã nguồn mở)
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpassword
    command: server /data --console-address ":9001"
    networks:
      - peerdb-lab

  # 4. PeerDB Metadata DB (Postgres nội bộ để PeerDB lưu cấu hình)
  peerdb-kv:
    image: postgres:15
    container_name: peerdb-kv
    environment:
      POSTGRES_PASSWORD: peerdb_password
      POSTGRES_DB: peerdb_metadata
    networks:
      - peerdb-lab

  # 5. PeerDB Server (Engine xử lý chính)
  peerdb-server:
    image: peerdb/server:latest
    container_name: peerdb-server
    ports:
      - "8234:8234" # Cổng kết nối qua giao thức SQL Postgres
    environment:
      - PEERDB_KV_CONN_STRING=postgresql://postgres:peerdb_password@peerdb-kv:5432/peerdb_metadata?sslmode=disable
      - AWS_ENDPOINT_URL_S3=http://minio:9000
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadminpassword
      - AWS_REGION=us-east-1
    depends_on:
      - peerdb-kv
      - minio
    networks:
      - peerdb-lab

  # 6. PeerDB UI (Giao diện Dashboard)
  peerdb-ui:
    image: peerdb/ui:latest
    container_name: peerdb-ui
    ports:
      - "8200:8200"
    environment:
      - PEERDB_SERVER_URL=http://peerdb-server:8234
    depends_on:
      - peerdb-server
    networks:
      - peerdb-lab