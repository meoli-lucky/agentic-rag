version: "3.9"

services:
  # Container Qwen2.5-3B trên GPU 0
  qwen2.5-3b:
    image: vllm/vllm-openai:latest
    container_name: qwen2.5-3b
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
      - CUDA_VISIBLE_DEVICES=0
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    ports:
      - "8000:8000" # host port 8000 map tới container port 8000
    ipc: host
    command: >
      Qwen/Qwen2.5-3B-Instruct --max-model-len 2048 --max-num-seqs 1 --gpu-memory-utilization 0.65 --dtype float16

  # Container MinerU2.5-Pro trên GPU 1
  mineru2.5-pro:
    image: vllm/vllm-openai:latest
    container_name: mineru2.5-pro
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=1
      - CUDA_VISIBLE_DEVICES=1
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    ports:
      - "8001:8000" # host port 8001 map tới container port 8000
    ipc: host
    command: >
      opendatalab/MinerU2.5-Pro-2604-1.2B --max-model-len 512 --max-num-seqs 1 --gpu-memory-utilization 0.5 --dtype float16

networks:
  default:
    name: vllm-net
