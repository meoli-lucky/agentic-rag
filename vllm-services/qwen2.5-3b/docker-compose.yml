version: "3.9"

services:
  qwen2.5-3b:
    image: vllm/vllm-openai:latest
    container_name: qwen2.5-3b
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - HUGGINGFACE_HUB_CACHE=/root/.cache/huggingface
    volumes:
      - /root/.cache/huggingface:/root/.cache/huggingface
    ports:
      - "8000:8000"
    ipc: host
    restart: unless-stopped
    command: >
      Qwen/Qwen2.5-3B-Instruct --host 0.0.0.0 --port 8000 --max-model-len 2048 --max-num-seqs 1 --gpu-memory-utilization 0.65 --dtype float16

  paddleocr-vl:
    image: paddleocr-vl-1.5:latest
    container_name: paddleocr-vl
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=1
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - HUGGINGFACE_HUB_CACHE=/root/.cache/huggingface
    volumes:
      - /root/.cache/huggingface:/root/.cache/huggingface
      - /opt/ocr-data:/data
    ports:
      - "8100:8100"
    ipc: host
    restart: unless-stopped

networks:
  default:
    name: vllm-net
