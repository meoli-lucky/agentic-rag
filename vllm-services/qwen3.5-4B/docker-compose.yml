version: '3.8'

services:
  qwen3.5-4b:
    image: vllm/vllm-openai:latest
    container_name: qwen3.5-4b-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    ipc: host
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - NVIDIA_VISIBLE_DEVICES=0
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    command: >
      --model Qwen/Qwen3.5-4B 
      --max-model-len 20000 
      --gpu-memory-utilization 0.90
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0', '1']
              capabilities: [gpu]
    networks:
      - default
