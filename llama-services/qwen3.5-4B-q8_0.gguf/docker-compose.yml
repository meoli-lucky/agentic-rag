services:
  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: llama_qwen3_5_local
    ports:
      - "8000:8080"
    volumes:
      - ./models:/models
    command: >
      -m /models/Qwen3.5-4B-Q8_0.gguf
      --host 0.0.0.0
      --port 8080
      -ngl 99
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]